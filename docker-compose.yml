services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      SQLALCHEMY_DATABASE_URI: sqlite+aiosqlite:////data/research_copilot.db
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data


volumes:
  sqlite_data:
